<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accessible Word Grid</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <h1>Accessible Word Grid</h1>

  <!-- ===============================
       Game Setup
  =============================== -->
  <section id="setup">
    <h2>Game Setup</h2>

    <label>
      Player 1 Name:
      <input type="text" id="player1-name" placeholder="Player 1" />
    </label>

    <label>
      Player 2 Name:
      <input type="text" id="player2-name" placeholder="Player 2" />
    </label>

    <div>
      <label>
        <input type="radio" name="mode" value="one" checked />
        Single Player
      </label>

      <label>
        <input type="radio" name="mode" value="two" />
        Two Player
      </label>
    </div>

    <button id="start-btn">Start Game</button>
  </section>

  <!-- ===============================
       Game Area
  =============================== -->
  <section id="game" hidden>
    <h2>Game</h2>

    <!-- Grid -->
    <div id="grid" class="grid"></div>

    <!-- Scores -->
    <div id="scores">
      <p id="p1-score"></p>
      <p id="p2-score" hidden></p>
    </div>

    <!-- Typed Input -->
    <div id="input-area">
      <input
        type="text"
        id="typed-word"
        placeholder="Type a word and press Enter"
        autocomplete="off"
      />
    </div>

    <!-- Controls -->
    <div id="controls">
      <button id="hint-btn">Hint</button>
      <button id="read-btn">Read Grid</button>
      <button id="listen-btn">Start Listening</button>
      <button id="stop-btn">Stop Listening</button>
      <button id="end-btn">End Game</button>
    </div>

    <!-- Status -->
    <div id="status" aria-live="polite"></div>

    <!-- Found Words -->
    <div id="found-words">
      <h3>Found Words</h3>
      <ul id="found-list"></ul>
    </div>

    <!-- Missed Words (created dynamically, but reserved space helps layout) -->
    <div id="missed-words-container"></div>
  </section>

  <!-- ===============================
       Statistics
  =============================== -->
  <section id="stats"></section>

  <!-- ===============================
       Scripts
  =============================== -->
  <script src="words.js"></script>
  <script src="dictionary.js"></script>
  <script src="puzzle.js"></script>
  <script src="commands.js"></script>
  <script src="storage.js"></script>
  <script src="speech.js"></script>
  <script src="game.js"></script>
</body>
</html>
